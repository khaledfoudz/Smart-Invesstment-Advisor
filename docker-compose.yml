version: "3.8"

services:
  db:
    image: postgres:15
    container_name: smia_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: investment_advisor
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./smia_database.sql:/docker-entrypoint-initdb.d/smia_database.sql:ro

  ml:
    build: ./backend/ml
    container_name: smia_ml
    restart: always
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    container_name: smia_backend
    platform: linux/amd64       # <-- Forces correct architecture
    restart: always
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: investment_advisor
      DB_PORT: 5432
      PORT: 4000
    depends_on:
      db:
        condition: service_started
      ml:
        condition: service_started

  frontend:
    image: node:20
    container_name: smia_frontend
    platform: linux/amd64      # <-- Forces correct architecture
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5001:5001"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  db_data: